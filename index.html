:root {
  --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);

  --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
  --text-2xl: clamp(2rem, 1.2rem + 2.5vw, 3.5rem);

  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-5: 1.25rem;
  --space-6: 1.5rem;
  --space-8: 2rem;
  --space-10: 2.5rem;
  --space-12: 3rem;
  --space-16: 4rem;

  --radius-sm: 0.375rem;
  --radius-md: 0.5rem;
  --radius-lg: 0.75rem;
  --radius-xl: 1rem;
  --radius-full: 9999px;

  --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);

  /* Score colors — Bitcoin/finance inspired */
  --score-5: #ec6640;   /* OW brand orange — pioneer */
  --score-4: #c9a86a;   /* soft gold */
  --score-3: #c9b79c;   /* muted sand */
  --score-2: #8b9196;   /* soft slate */
  --score-1: #2f4a3f;   /* dark forest — minimal */
  --score-none: #d4d0c4;

  --font-display: 'Raleway', 'Helvetica Neue', sans-serif;
  --font-body: 'Raleway', 'Helvetica Neue', sans-serif;
}

/* Dark mode (default) */
/* Orange Wheel Brand — Light mode default */
:root, [data-theme="light"] {
  --color-bg:              #eeece3;
  --color-surface:         #f5f3ea;
  --color-surface-2:       #f9f8f2;
  --color-surface-offset:  #e8e5da;
  --color-surface-dynamic: #dedad0;
  --color-divider:         #d4d0c4;
  --color-border:          #c8c4b8;
  --color-text:            #3e3d39;
  --color-text-muted:      #6e6c66;
  --color-text-faint:      #a8a69e;
  --color-primary:         #ec6640;
  --color-primary-hover:   #d45530;
  --color-primary-active:  #b84425;
  --color-accent:          #5c6f82;
  --color-accent-teal:     #2f8c8c;
  --color-forest:          #2f4a3f;
  --color-sand:            #c9b79c;
  --color-gold:            #c9a86a;
  --color-slate:           #8b9196;
  --shadow-sm: 0 1px 2px rgba(62,61,57,0.08);
  --shadow-md: 0 4px 12px rgba(62,61,57,0.12);
  --shadow-lg: 0 12px 40px rgba(62,61,57,0.18);
}

/* Dark mode */
[data-theme="dark"] {
  --color-bg:              #1a1917;
  --color-surface:         #211f1d;
  --color-surface-2:       #272522;
  --color-surface-offset:  #2c2a27;
  --color-surface-dynamic: #333028;
  --color-divider:         #3a3730;
  --color-border:          #46433a;
  --color-text:            #e8e4dc;
  --color-text-muted:      #a09c92;
  --color-text-faint:      #5a5750;
  --color-primary:         #ec6640;
  --color-primary-hover:   #f07850;
  --color-primary-active:  #f58a62;
  --color-accent:          #7a8fa4;
  --color-accent-teal:     #3aacac;
  --color-forest:          #4a7060;
  --color-sand:            #c9b79c;
  --color-gold:            #d4b47a;
  --color-slate:           #8b9196;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.35);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.45);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.6);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  font-size: var(--text-sm);
  color: var(--color-text);
  background: var(--color-bg);
  min-height: 100dvh;
  overflow-x: hidden;
}
button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
a { color: var(--color-primary); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── HEADER ── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--color-bg);
  border-bottom: 1px solid var(--color-divider);
  padding: var(--space-3) var(--space-6);
  display: flex;
  align-items: center;
  gap: var(--space-4);
}

.logo {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  flex-shrink: 0;
}

.logo-icon {
  width: 32px;
  height: 32px;
}

.logo-text {
  font-family: var(--font-display);
  font-size: var(--text-base);
  font-weight: 700;
  color: var(--color-text);
  line-height: 1.1;
}

.logo-sub {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  font-weight: 400;
  display: block;
}

.header-spacer { flex: 1; }

.header-controls {
  display: flex;
  align-items: center;
  gap: var(--space-3);
}

.data-badge {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  padding: var(--space-1) var(--space-3);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-full);
}

.data-badge span {
  color: var(--color-primary);
  font-weight: 600;
}

.theme-toggle {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-md);
  color: var(--color-text-muted);
  transition: color var(--transition-interactive), background var(--transition-interactive);
}
.theme-toggle:hover {
  color: var(--color-text);
  background: var(--color-surface-offset);
}

/* ── MAIN LAYOUT ── */
.main {
  display: grid;
  grid-template-columns: 1fr 420px;
  grid-template-rows: auto 1fr;
  height: calc(100dvh - 57px);
  gap: 0;
}

/* ── FILTER BAR ── */
.filter-bar {
  grid-column: 1 / -1;
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-divider);
  padding: var(--space-3) var(--space-6);
  display: flex;
  align-items: center;
  gap: var(--space-4);
  flex-wrap: wrap;
}

.filter-label {
  font-size: var(--text-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--color-text-muted);
  flex-shrink: 0;
}

.filter-group {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  flex-wrap: wrap;
}

.filter-btn {
  padding: var(--space-1) var(--space-3);
  border-radius: var(--radius-full);
  font-size: var(--text-xs);
  font-weight: 500;
  border: 1px solid var(--color-border);
  background: transparent;
  color: var(--color-text-muted);
  transition: all var(--transition-interactive);
  cursor: pointer;
  white-space: nowrap;
}
.filter-btn:hover {
  border-color: var(--color-primary);
  color: var(--color-primary);
}
.filter-btn.active {
  background: var(--color-primary);
  border-color: var(--color-primary);
  color: #fff;
  font-weight: 700;
}

.filter-divider {
  width: 1px;
  height: 20px;
  background: var(--color-divider);
  flex-shrink: 0;
}

/* ── MAP AREA ── */
.map-area {
  position: relative;
  overflow: hidden;
  background: var(--color-surface-offset);
}

#europe-map {
  width: 100%;
  height: 100%;
}

.map-loading {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--color-text-muted);
  font-size: var(--text-sm);
  gap: var(--space-3);
}

.map-loading-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--color-primary);
  animation: pulse 1.2s ease-in-out infinite;
}
.map-loading-dot:nth-child(2) { animation-delay: 0.2s; }
.map-loading-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes pulse {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

/* ── MAP SVG STYLES ── */
.country {
  cursor: pointer;
  transition: filter 0.15s ease, opacity 0.15s ease;
  stroke: var(--color-surface-offset);
  stroke-width: 0.5;
}
.country:hover {
  filter: brightness(1.4);
  stroke-width: 1.5;
  stroke: var(--color-text);
}
.country.selected {
  stroke-width: 2;
  stroke: var(--color-primary);
  filter: brightness(1.2);
}
.country.dimmed {
  opacity: 0.25;
}

/* ── TOOLTIP ── */
.tooltip {
  position: fixed;
  pointer-events: none;
  z-index: 500;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-4);
  box-shadow: var(--shadow-lg);
  max-width: 300px;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.15s ease, transform 0.15s ease;
}
.tooltip.visible {
  opacity: 1;
  transform: translateY(0);
}

.tooltip-country {
  font-family: var(--font-display);
  font-size: var(--text-base);
  font-weight: 700;
  color: var(--color-text);
  margin-bottom: var(--space-2);
  display: flex;
  align-items: center;
  gap: var(--space-2);
}

.tooltip-score-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  font-size: 11px;
  font-weight: 700;
  color: #000;
  flex-shrink: 0;
}

.tooltip-row {
  display: flex;
  align-items: flex-start;
  gap: var(--space-2);
  margin-bottom: var(--space-2);
  font-size: var(--text-xs);
}
.tooltip-row:last-child { margin-bottom: 0; }

.tooltip-icon {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
  margin-top: 1px;
  color: var(--color-text-muted);
}

.tooltip-row-label {
  font-weight: 600;
  color: var(--color-text-muted);
  min-width: 80px;
  flex-shrink: 0;
}

.tooltip-row-value {
  color: var(--color-text);
  line-height: 1.4;
}

.tooltip-hint {
  margin-top: var(--space-3);
  padding-top: var(--space-3);
  border-top: 1px solid var(--color-divider);
  font-size: var(--text-xs);
  color: var(--color-text-faint);
  text-align: center;
}

/* ── SIDEBAR / DETAIL PANEL ── */
.sidebar {
  border-left: 1px solid var(--color-divider);
  background: var(--color-surface);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.sidebar-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: var(--space-8);
  text-align: center;
  gap: var(--space-4);
}

.sidebar-empty-icon {
  width: 64px;
  height: 64px;
  opacity: 0.15;
}

.sidebar-empty-title {
  font-family: var(--font-display);
  font-size: var(--text-lg);
  font-weight: 600;
  color: var(--color-text);
}

.sidebar-empty-sub {
  font-size: var(--text-sm);
  color: var(--color-text-muted);
  line-height: 1.6;
}

/* Country Detail */
.country-detail {
  display: none;
  flex-direction: column;
  flex: 1;
}
.country-detail.visible {
  display: flex;
}

.detail-header {
  padding: var(--space-6);
  border-bottom: 1px solid var(--color-divider);
  background: var(--color-surface-2);
}

.detail-header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--space-4);
  margin-bottom: var(--space-4);
}

.detail-country-name {
  font-family: var(--font-display);
  font-size: var(--text-xl);
  font-weight: 700;
  color: var(--color-text);
  line-height: 1.1;
}

.detail-badges {
  display: flex;
  gap: var(--space-2);
  flex-wrap: wrap;
  margin-top: var(--space-2);
}

.detail-badge {
  padding: 2px var(--space-2);
  border-radius: var(--radius-full);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.badge-eu { background: rgba(47,74,63,0.15); color: var(--color-forest); border: 1px solid rgba(47,74,63,0.3); }
.badge-eea { background: rgba(47,140,140,0.12); color: var(--color-accent-teal); border: 1px solid rgba(47,140,140,0.3); }
.badge-non-eea { background: var(--color-surface-offset); color: var(--color-text-muted); border: 1px solid var(--color-border); }

.close-btn {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-md);
  color: var(--color-text-muted);
  flex-shrink: 0;
  transition: color var(--transition-interactive), background var(--transition-interactive);
}
.close-btn:hover {
  color: var(--color-text);
  background: var(--color-surface-offset);
}

/* Maturity meter */
.maturity-meter {
  background: var(--color-surface-offset);
  border-radius: var(--radius-lg);
  padding: var(--space-4);
}

.maturity-meter-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: var(--space-3);
}

.maturity-label {
  font-size: var(--text-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--color-text-muted);
}

.maturity-score-display {
  font-family: var(--font-display);
  font-size: var(--text-lg);
  font-weight: 700;
}

.maturity-bar-track {
  height: 8px;
  background: var(--color-divider);
  border-radius: var(--radius-full);
  overflow: hidden;
}

.maturity-bar-fill {
  height: 100%;
  border-radius: var(--radius-full);
  transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

.maturity-desc {
  margin-top: var(--space-2);
  font-size: var(--text-xs);
  color: var(--color-text-muted);
}

/* Detail sections */
.detail-sections {
  padding: var(--space-4) var(--space-6) var(--space-6);
  display: flex;
  flex-direction: column;
  gap: var(--space-4);
  flex: 1;
}

.detail-section {
  background: var(--color-surface-2);
  border: 1px solid var(--color-divider);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.section-header {
  padding: var(--space-3) var(--space-4);
  background: var(--color-surface-offset);
  border-bottom: 1px solid var(--color-divider);
  display: flex;
  align-items: center;
  gap: var(--space-2);
}

.section-icon {
  width: 16px;
  height: 16px;
  color: var(--color-primary);
  flex-shrink: 0;
}

.section-title {
  font-family: var(--font-display);
  font-size: var(--text-xs);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--color-text);
}

.section-body {
  padding: var(--space-4);
  font-size: var(--text-sm);
  color: var(--color-text);
  line-height: 1.6;
}

.section-row {
  display: grid;
  grid-template-columns: 110px 1fr;
  gap: var(--space-2) var(--space-3);
  font-size: var(--text-xs);
  padding: var(--space-2) var(--space-4);
  border-bottom: 1px solid var(--color-divider);
}
.section-row:last-child {
  border-bottom: none;
}

.section-row-label {
  font-weight: 600;
  color: var(--color-text-muted);
  padding-top: 1px;
}

.section-row-value {
  color: var(--color-text);
  line-height: 1.5;
}

.highlight-value {
  color: var(--color-primary);
  font-weight: 600;
  font-family: var(--font-display);
}

/* BTC Reserve status pill */
.reserve-status {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  padding: 2px var(--space-2);
  border-radius: var(--radius-full);
  font-size: 11px;
  font-weight: 600;
}
.reserve-active { background: rgba(236,102,64,0.12); color: var(--color-primary); }
.reserve-discussion { background: rgba(47,140,140,0.12); color: var(--color-accent-teal); }
.reserve-none { background: var(--color-surface-dynamic); color: var(--color-text-muted); }

/* Source links */
.sources-list {
  padding: var(--space-3) var(--space-4);
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
}
.source-link {
  font-size: var(--text-xs);
  color: var(--color-accent);
  word-break: break-all;
}

/* ── LEGEND ── */
.legend {
  position: absolute;
  bottom: var(--space-4);
  left: var(--space-4);
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-3) var(--space-4);
  box-shadow: var(--shadow-md);
  z-index: 10;
}

.legend-title {
  font-family: var(--font-display);
  font-size: var(--text-xs);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--color-text-muted);
  margin-bottom: var(--space-2);
}

.legend-items {
  display: flex;
  flex-direction: column;
  gap: var(--space-1);
}

.legend-item {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  font-size: var(--text-xs);
  color: var(--color-text-muted);
}

.legend-swatch {
  width: 12px;
  height: 12px;
  border-radius: 3px;
  flex-shrink: 0;
}

/* ── COUNTRY TABLE (bottom) ── */
.country-table-wrap {
  display: none;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--color-text-faint); }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .main {
    grid-template-columns: 1fr;
    grid-template-rows: 60vh auto;
    height: auto;
  }
  .sidebar {
    border-left: none;
    border-top: 1px solid var(--color-divider);
    min-height: 400px;
  }
}

/* No-data state */
.country.no-data {
  fill: var(--color-surface-offset);
  opacity: 0.4;
}

/* Zoom controls */
.zoom-controls {
  position: absolute;
  top: var(--space-4);
  right: var(--space-4);
  display: flex;
  flex-direction: column;
  gap: var(--space-1);
  z-index: 10;
}

.zoom-btn {
  width: 32px;
  height: 32px;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--color-text-muted);
  font-size: 16px;
  font-weight: 600;
  transition: all var(--transition-interactive);
  box-shadow: var(--shadow-sm);
}
.zoom-btn:hover {
  color: var(--color-text);
  border-color: var(--color-primary);
}
</style>

})();

const VIEW_CONFIG = {

    getColor: (d) => {
      const scores = { 5: '#ec6640', 4: '#c9a86a', 3: '#c9b79c', 2: '#8b9196', 1: '#2f4a3f' };
      return d ? (scores[d.score] || '#1f2937') : '#1f2937';

  taxation: {
    title: 'Crypto Tax Burden',
    legendItems: [
      { label: '5 — Very favourable (0% or near-0%)', color: '#2f4a3f' },
      { label: '4 — Favourable (low rate + good rules)', color: '#2f8c8c' },
      { label: '3 — Moderate', color: '#c9b79c' },
      { label: '2 — High burden', color: '#c9a86a' },
      { label: '1 — Most punitive (rate + bad rules)', color: '#ec6640' },
      { label: 'No data', color: '#d4d0c4' },
    ],
    getColor: (d) => {
      if (!d) return '#d4d0c4';
      const ts = d.tax_score || 3;
      const colors = { 5: '#2f4a3f', 4: '#2f8c8c', 3: '#c9b79c', 2: '#c9a86a', 1: '#ec6640' };
      return colors[ts] || '#c9b79c';
    }
  },
  mica: {
    title: 'MiCA Compliance Status',
    legendItems: [
      { label: 'Fully implemented', color: '#22c55e' },
      { label: 'In transition / partial', color: '#eab308' },
      { label: 'Not applicable (non-EU)', color: '#6b7280' },
      { label: 'Equivalent own framework', color: '#3b82f6' },
      { label: 'Delayed / pending', color: '#ef4444' },
      { label: 'No data', color: '#1f2937' },
    ],
    getColor: (d) => {
      if (!d) return '#1f2937';
      const m = (d.mica || '').toLowerCase();
      if (!d.eu && !d.eea) {
        if (m.includes('equivalent') || m.includes('own framework') || m.includes('aligned')) return '#3b82f6';
        return '#6b7280';
      }
      if (m.includes('fully') || m.includes('complete') || m.includes('implemented') || m.includes('transposition complete')) return '#22c55e';
      if (m.includes('transition') || m.includes('partial') || m.includes('underway')) return '#eab308';
      if (m.includes('delayed') || m.includes('pending') || m.includes('not yet') || m.includes('vetoed')) return '#ef4444';
      return '#eab308'; // default for EU/EEA = in transition
    }
  },
  btc_reserve: {
    title: 'BTC Reserve Policy',
    legendItems: [
      { label: 'Active seized / held (treasury)', color: '#f7931a' },
      { label: 'Active SWF holdings', color: '#22c55e' },
      { label: 'Indirect exposure (equity index)', color: '#2f8c8c' },
      { label: 'Proposal pending', color: '#c9a86a' },
      { label: 'Sold / liquidated', color: '#ef4444' },
      { label: 'No national reserve', color: '#d4d0c4' },
      { label: 'Sold + Proposal pending (Germany)', color: '#ef4444', color2: '#c9a86a' },
      { label: 'Active + Proposal pending (Ukraine)', color: '#f7931a', color2: '#c9a86a' },
      { label: 'Proposal + Indirect (Switzerland)', color: '#c9a86a', color2: '#2f8c8c' },
    ],
    getColor: (d) => {
      if (!d || !d.nr) return '#d4d0c4';
      const cat  = d.nr.cat  || 'none';
      const cat2 = d.nr.cat2 || null;

        'active_seized':    '#f7931a',
        'active_swf':       '#22c55e',
        'indirect_only':    '#2f8c8c',
        'proposal_pending': '#c9a86a',
        'sold_liquidated':  '#ef4444',
        'none':             '#d4d0c4',

      // Multi-status: return hatch pattern if available
      if (cat2 && window.HATCH_PATTERNS) {
        const key1 = cat + '+' + cat2;
        const key2 = cat2 + '+' + cat;
        if (window.HATCH_PATTERNS[key1]) return window.HATCH_PATTERNS[key1];

    getColor: (d) => {
      if (!d) return '#1f2937';
      const l = (d.legal || '').toLowerCase();
      if (l.includes('banned') || l.includes('prohibit')) return '#ef4444';
      if (l.includes('restrict')) return '#f97316';
      if (l.includes('gray') || l.includes('grey') || l.includes('unclear')) return '#eab308';
      if (l.includes('legal') && (l.includes('clearly') || l.includes('fully') || l.includes('well-regulated') || l.includes('regulated'))) return '#22c55e';

const filterBtns = document.querySelectorAll('[data-filter]');
const viewBtns = document.querySelectorAll('[data-view]');

filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    applyFilterAndColor();
  });
});

viewBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    viewBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    applyFilterAndColor();
    updateLegend();
  });
});

  const iso = d ? d.iso2 : '';
  if (currentFilter === 'all') return true;
  if (currentFilter === 'eu') return d && d.eu;
  if (currentFilter === 'eea') return d && d.eea;
  if (currentFilter === 'non-eea') return d && !d.eea;
  return true;
}

function applyFilterAndColor() {
  const config = VIEW_CONFIG[currentView];
  d3.selectAll('.country')
    .attr('fill', function() {
      const name = d3.select(this).attr('data-name');
      const d = COUNTRY_DATA[name];
      if (!isVisible(d)) return 'var(--score-none)';
      return config.getColor(d);
    })
    .classed('dimmed', function() {
      const name = d3.select(this).attr('data-name');
      const d = COUNTRY_DATA[name];
      return !isVisible(d);
    });
}

function updateLegend() {
  const config = VIEW_CONFIG[currentView];
  document.getElementById('legend-title').textContent = config.title;

const tooltip = document.getElementById('tooltip');

function showTooltip(e, name, data) {
  if (!data) {

  } else {

    const scoreTxt = { 5: '#fff', 4: '#3e3d39', 3: '#3e3d39', 2: '#fff', 1: '#fff' };
    const scoreLabels = { 5: 'Pioneer', 4: 'Advanced', 3: 'Developing', 2: 'Early Stage', 1: 'Minimal' };
    const memberBadge = data.eu ? '<span class="detail-badge badge-eu">EU</span>' : data.eea ? '<span class="detail-badge badge-eea">EEA</span>' : '<span class="detail-badge badge-non-eea">Non-EEA</span>';

    tooltip.innerHTML = `
      <div class="tooltip-country">
        <span class="tooltip-score-badge" style="background:${scoreColors[data.score]};color:${scoreTxt[data.score]||'#fff'}">${data.score}</span>
        ${name} ${memberBadge}
      </div>
      <div class="tooltip-row">
        <span class="tooltip-row-label">Tax rate</span>
        <span class="tooltip-row-value">${truncate(data.tax_rate, 80)}</span>
      </div>
      <div class="tooltip-row">
        <span class="tooltip-row-label">MiCA</span>
        <span class="tooltip-row-value">${truncate(data.mica, 80)}</span>
      </div>
      <div class="tooltip-row">
        <span class="tooltip-row-label">Regulator</span>
        <span class="tooltip-row-value">${truncate(data.regulator, 60)}</span>
      </div>
      <div class="tooltip-hint">Click to view full profile →</div>
    `;
  }
  positionTooltip(e);
  tooltip.classList.add('visible');
}

function positionTooltip(e) {
  const margin = 16;
  const tw = tooltip.offsetWidth || 280;
  const th = tooltip.offsetHeight || 160;
  let x = e.clientX + 16;
  let y = e.clientY - 20;
  if (x + tw > window.innerWidth - margin) x = e.clientX - tw - 16;
  if (y + th > window.innerHeight - margin) y = e.clientY - th - 16;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function hideTooltip() {
  tooltip.classList.remove('visible');
}

function truncate(str, n) {
  if (!str) return '—';
  return str.length > n ? str.slice(0, n) + '…' : str;
}

// ── MAP ──
async function initMap() {
  const mapEl = document.getElementById('europe-map');
  const width = mapEl.parentElement.clientWidth;
  const height = mapEl.parentElement.clientHeight;

  const svg = d3.select('#europe-map')
    .attr('width', width)
    .attr('height', height);

  // Inject SVG <defs> with diagonal stripe patterns for multi-status countries
  const defs = svg.append('defs');

  // Pattern factory: 45-degree stripes alternating color1 and color2
  function makeHatchPattern(id, color1, color2, stripeW) {
    const sw = stripeW || 8;
    const pat = defs.append('pattern')
      .attr('id', id)
      .attr('patternUnits', 'userSpaceOnUse')
      .attr('width', sw * 2)
      .attr('height', sw * 2)
      .attr('patternTransform', 'rotate(45)');
    pat.append('rect').attr('width', sw).attr('height', sw * 2).attr('fill', color1);
    pat.append('rect').attr('x', sw).attr('width', sw).attr('height', sw * 2).attr('fill', color2);
    return 'url(#' + id + ')';
  }

  // Pre-generate patterns for multi-status combinations
  window.HATCH_PATTERNS = {
    'sold_liquidated+proposal_pending': makeHatchPattern('hatch-sold-proposal', '#ef4444', '#c9a86a'),
    'active_seized+proposal_pending':   makeHatchPattern('hatch-seized-proposal', '#f7931a', '#c9a86a'),
    'proposal_pending+indirect_only':   makeHatchPattern('hatch-proposal-indirect', '#c9a86a', '#2f8c8c'),
  };

  const g = svg.append('g').attr('class', 'map-group');

  // Zoom behavior
  zoomBehavior = d3.zoom()
    .scaleExtent([0.8, 10])
    .on('zoom', (event) => {
      g.attr('transform', event.transform);
    });
  svg.call(zoomBehavior);

  // Zoom controls
  document.getElementById('zoom-in').addEventListener('click', () => {
    svg.transition().call(zoomBehavior.scaleBy, 1.5);
  });
  document.getElementById('zoom-out').addEventListener('click', () => {
    svg.transition().call(zoomBehavior.scaleBy, 0.67);
  });
  document.getElementById('zoom-reset').addEventListener('click', () => {
    svg.transition().call(zoomBehavior.transform, d3.zoomIdentity.translate(0,0).scale(1));
  });

  // Load TopoJSON — using Natural Earth data
  let world;
  try {
    world = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json');
  } catch(e) {
    document.getElementById('map-loading').innerHTML = '<span>Failed to load map. Please refresh.</span>';
    return;
  }

  document.getElementById('map-loading').style.display = 'none';

  // Europe projection — shifted south to include Malta (35.9°N) and Cyprus
  const projection = d3.geoConicConformal()
    .center([14, 50])
    .parallels([36, 64])
    .scale(Math.min(width, height) * 1.85)
    .translate([width * 0.47, height * 0.47])
    .clipExtent([[0, 0], [width, height]]);

  const path = d3.geoPath().projection(projection);
  


  // Country name map (ISO numeric → display name)
  // We'll match by name using country properties
  const countries = topojson.feature(world, world.objects.countries);

  // ISO numeric to name — we use our own name matching
  // Natural Earth uses numeric codes, map to our names
  const numericToName = {
    4: 'Afghanistan', 8: 'Albania', 12: 'Algeria', 20: 'Andorra', 24: 'Angola',
    32: 'Argentina', 36: 'Australia', 40: 'Austria', 50: 'Bangladesh', 56: 'Belgium',
    64: 'Bhutan', 68: 'Bolivia', 70: 'Bosnia and Herzegovina', 100: 'Bulgaria',
    116: 'Cambodia', 120: 'Cameroon', 124: 'Canada', 152: 'Chile', 156: 'China',
    170: 'Colombia', 191: 'Croatia', 192: 'Cuba', 196: 'Cyprus', 203: 'Czech Republic',
    208: 'Denmark', 218: 'Ecuador', 818: 'Egypt', 233: 'Estonia', 246: 'Finland',
    250: 'France', 268: 'Georgia', 276: 'Germany', 288: 'Ghana', 300: 'Greece',
    320: 'Guatemala', 348: 'Hungary', 356: 'India', 360: 'Indonesia', 364: 'Iran',
    368: 'Iraq', 372: 'Ireland', 376: 'Israel', 380: 'Italy', 388: 'Jamaica',
    392: 'Japan', 400: 'Jordan', 398: 'Kazakhstan', 404: 'Kenya', 414: 'Kuwait',
    410: 'South Korea', 422: 'Lebanon', 428: 'Latvia', 440: 'Lithuania',
    442: 'Luxembourg', 440: 'Lithuania', 807: 'North Macedonia', 454: 'Malawi',
    458: 'Malaysia', 470: 'Malta', 484: 'Mexico', 498: 'Moldova', 492: 'Monaco',
    504: 'Morocco', 516: 'Namibia', 524: 'Nepal', 528: 'Netherlands', 554: 'New Zealand',
    562: 'Niger', 566: 'Nigeria', 578: 'Norway', 586: 'Pakistan', 591: 'Panama',
    598: 'Papua New Guinea', 604: 'Peru', 608: 'Philippines', 616: 'Poland',
    620: 'Portugal', 630: 'Puerto Rico', 642: 'Romania', 643: 'Russia',
    682: 'Saudi Arabia', 686: 'Senegal', 688: 'Serbia', 703: 'Slovakia',
    705: 'Slovenia', 706: 'Somalia', 710: 'South Africa', 724: 'Spain',
    144: 'Sri Lanka', 729: 'Sudan', 752: 'Sweden', 756: 'Switzerland',
    760: 'Syria', 762: 'Tajikistan', 764: 'Thailand', 792: 'Turkey',
    800: 'Uganda', 804: 'Ukraine', 784: 'United Arab Emirates',
    826: 'United Kingdom', 840: 'United States', 858: 'Uruguay', 860: 'Uzbekistan',
    862: 'Venezuela', 704: 'Vietnam', 887: 'Yemen', 894: 'Zambia', 716: 'Zimbabwe',
    8: 'Albania', 51: 'Armenia', 31: 'Azerbaijan', 112: 'Belarus',
    499: 'Montenegro', 383: 'Kosovo', 428: 'Latvia',
  };

  // Additional: Kosovo is often missing from TopoJSON; we'll add it manually if needed
  const europeanCountries = new Set(Object.keys(COUNTRY_DATA));

  g.selectAll('.country')
    .data(countries.features)
    .join('path')
    .attr('class', 'country')
    .attr('data-name', d => {
      const name = numericToName[+d.id];
      return name || '';
    })
    .attr('d', path)
    .attr('fill', d => {
      const name = numericToName[+d.id];
      const countryData = name ? COUNTRY_DATA[name] : null;
      return VIEW_CONFIG[currentView].getColor(countryData);
    })
    .on('mousemove', function(event, d) {
      const name = d3.select(this).attr('data-name');
      if (!name) return;
      const countryData = COUNTRY_DATA[name];
      if (!europeanCountries.has(name) && !countryData) return;
      showTooltip(event, name, countryData);
    })
    .on('mouseleave', function() {
      hideTooltip();
    })
    .on('click', function(event, d) {
      const name = d3.select(this).attr('data-name');
      if (!name) return;
      hideTooltip();

      // Toggle selection
      if (selectedCountry === name) {
        closeDetail();
        return;
      }

      d3.selectAll('.country').classed('selected', false);
      d3.select(this).classed('selected', true);
      showCountryDetail(name);
    });

  // Update legend
  updateLegend();

  // Resize handler
  window.addEventListener('resize', () => {
    const w2 = mapEl.parentElement.clientWidth;
    const h2 = mapEl.parentElement.clientHeight;
    svg.attr('width', w2).attr('height', h2);
    projection
      .scale(Math.min(w2, h2) * 1.85)
      .translate([w2 * 0.47, h2 * 0.47]);
    g.selectAll('.country').attr('d', path);
  });
}

// Defer map init to ensure container has dimensions (fixes iframe rendering)
function startMap() {
  const mapEl = document.getElementById('map');
  if (!mapEl || mapEl.parentElement.clientWidth === 0) {
    setTimeout(startMap, 50);
    return;
  }
  initMap();
}

if (document.readyState === 'complete') {
  setTimeout(startMap, 0);
} else {
  window.addEventListener('load', () => setTimeout(startMap, 0));
}
</script>
